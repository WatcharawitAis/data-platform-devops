name: CI/CD Template for data ops

on: 
  workflow_call:
    inputs:
      target_env:
        description: 'Environment to deploy  (dev, staging, prod)'
        required: false
        type: string
        default: 'dev'
  
    secrets:
      DATABRICKS_HOST:
        description: 'Databricks workspace URL (e.g., https://xxx.cloud.databricks.com)'
        required: true
      DATABRICKS_TOKEN:
        description: 'Access Token For Databrick'
        required: true
      DATABRICKS_CLUSTER_ID:
        description: 'DATABRICKS_CLUSTER_ID'
        required: false
        
jobs:
  # CI template
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_CLUSTER_ID: ${{ secrets.DATABRICKS_CLUSTER_ID }}
    steps:
      - name: 'Checkout Calling Repository'
        uses: actions/checkout@v4
      - name: 'Install Databricks CLI'
        uses: databricks/setup-cli@v1
      - name: 'Validate Databricks Asset Bundle Config'
        run: |
          databricks bundle validate --target ${{ inputs.target_env }}
      - name: 'Install Python Dependencies'
        run: |
          pip install -r requirements.txt pytest
      - name: 'Run All Tests'
        run: |
          pytest src/tests/ -v
          

  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/staging')
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: 'Checkout Calling Repository'
        uses: actions/checkout@v4
      - name: 'Install Databricks CLI'
        uses: databricks/setup-cli@v1
      - name: 'Deploy Bundle'
        run: |
          databricks bundle deploy --target ${{ inputs.target_env }}
          


