name: CI/CD Template for data ops

on: 
  workflow_call:
    inputs:
      target_env:
        description: 'Environment to deploy  (dev, staging, prod)'
        required: false
        type: string
        default: 'dev'
  
    secrets:
      DATABRICKS_HOST:
        description: 'Databricks workspace URL (e.g., https://xxx.cloud.databricks.com)'
        required: true
      DATABRICKS_TOKEN:
        description: 'Access Token For Databrick'
        required: true
      DATABRICKS_CLUSTER_ID:
        description: 'DATABRICKS_CLUSTER_ID'
        required: false
        
jobs:
  # CI template
  ci:
    name: Continuous Integration (Syntax & Lint)
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: 'Checkout Calling Repository'
        uses: actions/checkout@v4
        
      - name: 'Install Databricks CLI'
        uses: databricks/setup-cli@main
        
      - name: 'Validate Databricks Asset Bundle Config'
        run: |
          databricks bundle validate --target ${{ inputs.target_env }}
          
      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: 'Install Pylint'
        run: |
          pip install pylint
          
      - name: 'Check Code Syntax & Formatting'
        continue-on-error: true
        run: |
          pylint .
          

  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci

    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/staging')) || 
      (github.event_name == 'pull_request' && (github.base_ref == 'dev' || github.base_ref == 'staging'))
    
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: 'Checkout Calling Repository'
        uses: actions/checkout@v4
        
      - name: 'Install Databricks CLI'
        uses: databricks/setup-cli@main

      - name: 'Install uv'
        uses: astral-sh/setup-uv@v6

      - name: Verify uv
        run: uv --version
        
      - name: 'Deploy Bundle' 
        run: |
          databricks bundle deploy --target ${{ inputs.target_env }}
          
      - name: 'Run Integration Test'
        if: ${{ inputs.target_env != 'prod' }}
        run: |
          databricks bundle run test -t ${{ inputs.target_env }}
          


